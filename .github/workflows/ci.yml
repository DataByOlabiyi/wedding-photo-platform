name: CI

on:
  push:
    branches: [main, saas]
  pull_request:
    branches: [main, saas]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
        env:
          PIN_COOKIE_SECRET: ci-test-secret-placeholder-32bytes
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiJ9.placeholder
          NEXT_PUBLIC_URL: https://example.com
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiJ9.placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRO_PRICE_ID: price_placeholder
          PIN_COOKIE_SECRET: ci-test-secret-placeholder-32bytes

  e2e:
    name: E2E Tests (manual / pre-deploy)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npx playwright test
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_EVENT_SLUG: ${{ secrets.TEST_EVENT_SLUG }}
          TEST_COUPLE_EMAIL: ${{ secrets.TEST_COUPLE_EMAIL }}
          TEST_COUPLE_PASSWORD: ${{ secrets.TEST_COUPLE_PASSWORD }}
